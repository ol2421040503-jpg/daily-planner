name: Build and Release (No Signing)

on:
  push:
    tags:
      - 'v*' # 当推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch: # 也支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get version from package.json
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Electron app
        run: pnpm electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap
          retention-days: 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap
          body: |
            ## 每日规划 v${{ steps.version.outputs.VERSION }}
            
            ### 下载
            - Windows 用户下载 `Setup.${{ steps.version.outputs.VERSION }}.exe`
            - 国内用户可从 [Gitee Releases](https://gitee.com/europe-and-oceania/daily-planner/releases) 下载，速度更快
            
            ### 更新说明
            请查看下方的 commits 记录
            
            ---
            > 作者：严辉村高斯林
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 同步代码和安装包到 Gitee
  sync-to-gitee:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: ./installer

      - name: Push to Gitee
        run: |
          git remote add gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/europe-and-oceania/daily-planner.git
          git push gitee --all --force
          git push gitee --tags --force
          echo "✅ 代码已同步到 Gitee"

      - name: List installer files
        run: |
          echo "📦 安装包文件列表："
          ls -la ./installer/

      - name: Create Gitee Release with assets
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          
          echo "🚀 正在创建 Gitee Release ${TAG_NAME}..."
          
          # 创建 Release
          RELEASE_RESPONSE=$(curl -s -X POST "https://gitee.com/api/v5/repos/europe-and-oceania/daily-planner/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${{ secrets.GITEE_TOKEN }}\",
              \"tag_name\": \"${TAG_NAME}\",
              \"name\": \"每日规划 v${VERSION}\",
              \"body\": \"## 每日规划 v${VERSION}\\n\\n### 更新说明\\n请查看 [GitHub Releases](https://github.com/ol2421040503-jpg/daily-planner/releases) 获取详细更新内容。\\n\\n---\\n> 作者：严辉村高斯林\",
              \"prerelease\": false
            }")
          
          echo "Release 创建响应: ${RELEASE_RESPONSE}"
          
          # 提取 release id
          RELEASE_ID=$(echo "${RELEASE_RESPONSE}" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
          echo "Release ID: ${RELEASE_ID}"
          
          # 上传安装包
          echo "📤 正在上传安装包到 Gitee..."
          
          for file in ./installer/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "上传: ${filename}"
              
              UPLOAD_RESPONSE=$(curl -s -X POST \
                "https://gitee.com/api/v5/repos/europe-and-oceania/daily-planner/releases/${RELEASE_ID}/attach_files" \
                -H "Content-Type: multipart/form-data" \
                -F "access_token=${{ secrets.GITEE_TOKEN }}" \
                -F "file=@${file}")
              
              echo "上传响应: ${UPLOAD_RESPONSE}"
            fi
          done
          
          echo "✅ Gitee Release 发布完成！"
