name: Build and Release (No Signing)

on:
  push:
    tags:
      - 'v*' # 当推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch: # 也支持手动触发

jobs:
  # 构建 Windows 安装包并上传到 GitHub Release
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get version from package.json
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Electron app
        run: pnpm electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap
          body: |
            ## 每日规划 v${{ steps.version.outputs.VERSION }}
            
            ### 下载安装
            - Windows 用户下载 `Setup.${{ steps.version.outputs.VERSION }}.exe`
            
            ### 更新说明
            请查看下方的 commits 记录
            
            ---
            > 作者：严辉村高斯林
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 同步代码到 Gitee（不上传安装包）
  sync-to-gitee:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/europe-and-oceania/daily-planner.git
          git push gitee --all --force
          git push gitee --tags --force
          echo "✅ 代码已同步到 Gitee"

      - name: Create Gitee Release (without assets)
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          COMMIT_SHA=$(git rev-parse HEAD)
          
          echo "🚀 创建 Gitee Release ${TAG_NAME}..."
          
          curl -s -X POST "https://gitee.com/api/v5/repos/europe-and-oceania/daily-planner/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${{ secrets.GITEE_TOKEN }}\",
              \"tag_name\": \"${TAG_NAME}\",
              \"target_commitish\": \"${COMMIT_SHA}\",
              \"name\": \"每日规划 v${VERSION}\",
              \"body\": \"## 每日规划 v${VERSION}\\n\\n### 📥 下载安装包\\n请前往 [GitHub Releases](https://github.com/ol2421040503-jpg/daily-planner/releases/tag/${TAG_NAME}) 下载安装包\\n\\n### 更新说明\\n请查看 GitHub Releases 获取详细更新内容。\\n\\n---\\n> 作者：严辉村高斯林\",
              \"prerelease\": false
            }"
          
          echo ""
          echo "✅ Gitee Release 创建完成"
